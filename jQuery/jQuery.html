<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic jQuery</title>

    <!-- Link to the Google-hosted jQuery library -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.0/jquery.min.js"></script>
</head>

<body>

    <script>
        // Wait until the document has fully loaded before running jQuery.
        $(document).ready(function () {

            // Select the HTML element and append the page content.
            $("html").append(
                "<body>" +
                    "<div id='container'>" +
                        "<div id='inner'>" +
                            "<h1>Basic jQuery</h1>" +
                            "<p id='1'>Paragraph 1</p>" +
                            "<p id='2'>Paragraph 2</p>" +
                            "<p id='3'>Paragraph 3</p>" +
                        "</div>" +
                    "</div>" +
                "</body>"
            );

            // Use jQuery to change Paragraph 2 to red.
            $("#2").css({ "color": "red" });

            // When Paragraph 3 is clicked, hide the heading.
            $("#3").click(function () {
                $("h1").hide();
            });
        });
    </script>

</body>
</html>
